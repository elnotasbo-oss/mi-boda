<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boda: Maria de los Angeles y Alex</title>
    <style>
        /* Eliminamos cualquier margen predeterminado del navegador */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            background: url('fondo-estatico.jpg') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Georgia', serif;
        }
        
        /* Contenedor que fuerza el borde a borde */
        .seccion { 
            width: 100vw; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        
        /* Imágenes: ancho total y altura proporcional */
        img { 
            width: 100vw; 
            height: auto; 
            display: block; 
        }
        
        /* Botón de sonido abajo a la izquierda */
        #btnAudio {
            position: fixed; 
            bottom: 20px; 
            left: 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #5a4a42; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px;
            cursor: pointer; 
            font-size: 16px; 
            z-index: 1000;
        }
    </style>
</head>
<body>

    <button id="btnAudio">🔊</button>

    <div class="seccion"><img src="imagen1.png" alt="Sección 1"></div>
    <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
    <div class="seccion"><img src="imagen2.png" alt="Sección 3"></div>

    <audio id="musicaFondo" loop>
        <source src="fondo-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        audio.volume = 0.1;

        btn.onclick = function() {
            if (audio.muted) {
                audio.muted = false;
                btn.innerHTML = "🔊";
            } else {
                audio.muted = true;
                btn.innerHTML = "🔇";
            }
        };

        document.body.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
            }
        }, { once: true });
    </script>
</body>
</html>
