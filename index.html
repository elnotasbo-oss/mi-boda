<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#d9b6ad">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Nuestra Boda: Maria de los Angeles y Alex">
    <meta property="og:description" content="¡Te invitamos a celebrar con nosotros este noviembre!">
    <meta property="og:image" content="https://elnotasbo-oss.github.io/Angeles-y-Alex/preview.jpg">
    <meta property="og:type" content="website">

    <title>Boda: Maria de los Angeles y Alex</title>
    <style>
        /* Ocultar contenido mientras carga para evitar parpadeos */
        body { opacity: 0; transition: opacity 0.5s ease; }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
        
        /* Capa de destellos (flota sobre todo) */
        .destellos {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: url('destellos.png');
            pointer-events: none; /* Permite hacer clic a través de la capa */
            z-index: 1500; /* Entre el sobre y el contenido */
            opacity: 0.6;
        }
        
        #invitacion { 
            background: url('fondo-estatico.jpg') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes pulso {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        #sobre {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('sobre-cerrado.png') no-repeat center center;
            background-size: cover; 
            z-index: 2000; cursor: pointer;
            transition: opacity 1s ease;
            animation: pulso 3s infinite ease-in-out;
        }

        .seccion { width: 100vw; }
        img { width: 100vw; height: auto; display: block; }
        
        #btnAudio {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #5a4a42; border-radius: 50%; 
            width: 40px; height: 40px;
            cursor: pointer; font-size: 16px; z-index: 1000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="destellos"></div>
    <div id="sobre"></div>

    <div id="invitacion">
        <div class="seccion"><img src="imagen1.png" alt="Sección 1"></div>
        <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
        <div class="seccion"><img src="imagen2.png" alt="Sección 3"></div>
    </div>

    <button id="btnAudio">🔊</button>

    <audio id="musicaFondo" loop>
        <source src="fondo-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Hacer visible la página una vez cargada
        window.onload = function() { document.body.style.opacity = '1'; };

        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        var sobre = document.getElementById("sobre");
        audio.volume = 0.1;

        sobre.onclick = function() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            }
            
            audio.play();
            
            sobre.style.opacity = '0';
            setTimeout(() => { sobre.style.display = 'none'; }, 1000);
        };

        btn.onclick = function() {
            if (audio.muted) {
                audio.muted = false;
                btn.innerHTML = "🔊";
            } else {
                audio.muted = true;
                btn.innerHTML = "🔇";
            }
        };
    </script>
</body>
</html>
