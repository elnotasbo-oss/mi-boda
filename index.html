<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#d9b6ad">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Nuestra Boda: Maria de los Angeles y Alex">
    <meta property="og:description" content="¡Te invitamos a celebrar con nosotros este noviembre!">
    <meta property="og:image" content="https://elnotasbo-oss.github.io/Angeles-y-Alex/preview.jpg">
    <meta property="og:type" content="website">

    <title>Boda: Maria de los Angeles y Alex</title>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        body { opacity: 0; transition: opacity 0.5s ease; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
        
        #invitacion { 
            background: url('fondo-estatico.jpg') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes pulso {
            0% { transform: scale(1); }
            50% { transform: scale(1.015); } /* Ajuste de intensidad sutil */
            100% { transform: scale(1); }
        }

        #contenedor-sobre {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2000; transition: opacity 1s ease;
        }

        #sobre {
            width: 100%; height: 100%;
            background: url('sobre-cerrado.png') no-repeat center center;
            background-size: cover; 
            cursor: pointer;
            animation: pulso 5s infinite ease-in-out; /* Duración relajada */
        }

        .seccion { width: 100vw; }
        img { width: 100vw; height: auto; display: block; }
        
        #btnAudio {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.3); /* Transparencia 50% */
            border: 1px solid #5a4a42; border-radius: 50%; 
            width: 35px; height: 35px;
            cursor: pointer; font-size: 16px; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Contenedor del sobre y flechas -->
    <div id="contenedor-sobre">
        <div id="sobre"></div>
        
        <!-- Flechas animadas posicionadas arriba del centro -->
        <div style="position: absolute; top: 32%; width: 100%; display: flex; justify-content: center; pointer-events: none;">
            <lottie-player src="Arrow.json" background="transparent" speed="1" style="width: 80px; height: 80px;" loop autoplay></lottie-player>
        </div>
    </div>

    <div id="invitacion">
        <div class="seccion"><img src="imagen1.png" alt="Sección 1"></div>
        <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
        
        <div style="display: flex; justify-content: center; margin: 20px 0;">
            <lottie-player src="Wedding.json" background="transparent" speed="1" style="width: 70px; height: 70px;" loop autoplay></lottie-player>
        </div>
        
        <div class="seccion"><img src="imagen2.png" alt="Sección 3"></div>
    </div>

    <button id="btnAudio">🎵</button>

    <audio id="musicaFondo" loop>
        <source src="fondo-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        window.onload = function() { document.body.style.opacity = '1'; };

        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        var contenedorSobre = document.getElementById("contenedor-sobre");
        audio.volume = 0.3;

        contenedorSobre.onclick = function() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            
            audio.play();
            contenedorSobre.style.opacity = '0';
            setTimeout(() => { contenedorSobre.style.display = 'none'; }, 1000);
        };

        btn.onclick = function() {
            if (audio.muted) {
                audio.muted = false;
                btn.innerHTML = "🎵";
            } else {
                audio.muted = true;
                btn.innerHTML = "🔇";
            }
        };
    </script>
</body>
</html>
