<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boda: Maria de los Angeles y Alex</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
        
        /* Fondo estático de la invitación */
        #invitacion { 
            background: url('fondo-estatico.jpg') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Capa del sobre (Portada) */
        #sobre {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('sobre-cerrado.png') no-repeat center center;
            background-size: cover; /* Ajusta proporcionalmente */
            z-index: 2000; cursor: pointer;
            transition: opacity 1s ease;
        }

        .seccion { width: 100vw; }
        img { width: 100vw; height: auto; display: block; }
        
        #btnAudio {
            position: fixed; bottom: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #5a4a42; border-radius: 50%; 
            width: 40px; height: 40px;
            cursor: pointer; font-size: 16px; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="sobre"></div>

    <div id="invitacion">
        <div class="seccion"><img src="imagen1.png" alt="Sección 1"></div>
        <div class="seccion"><img src="imagen.png" alt="Sección 2"></div>
        <div class="seccion"><img src="imagen2.png" alt="Sección 3"></div>
    </div>

    <button id="btnAudio">🔊</button>

    <audio id="musicaFondo" loop>
        <source src="fondo-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        var audio = document.getElementById("musicaFondo");
        var btn = document.getElementById("btnAudio");
        var sobre = document.getElementById("sobre");
        audio.volume = 0.1;

        // Al hacer clic en el sobre
        sobre.onclick = function() {
            // Ocultar sobre
            sobre.style.opacity = '0';
            setTimeout(() => { sobre.style.display = 'none'; }, 1000);
            
            // Iniciar música
            audio.play();
        };

        // Control de silencio
        btn.onclick = function() {
            if (audio.muted) {
                audio.muted = false;
                btn.innerHTML = "🔊";
            } else {
                audio.muted = true;
                btn.innerHTML = "🔇";
            }
        };
    </script>
</body>
</html>
